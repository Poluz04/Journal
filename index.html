<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Журнал">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Журнал оценок</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Onest:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f14;--bg2:#16161e;--bg3:#1e1e28;--bg4:#252530;
  --accent:#7c6ff7;--accent2:#a89cf5;--accent3:#5a52d5;
  --green:#4ade80;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;
  --text:#f0eeff;--text2:#9994cc;--text3:#5a5780;
  --border:#2a2840;--border2:#3d3960;
  --r:14px;--r2:10px;--r3:6px;
  --font:'Onest',sans-serif;--font2:'Unbounded',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
#app{max-width:430px;margin:0 auto;padding-bottom:80px;min-height:100vh}

/* NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(15,15,20,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:100;padding:0 8px}
.nav-btn{flex:1;padding:12px 4px 16px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);cursor:pointer;transition:color .2s;font-family:var(--font);font-size:10px;font-weight:500}
.nav-btn.active{color:var(--accent2)}
.nav-btn svg{width:22px;height:22px}

/* HEADER */
.header{padding:54px 20px 16px;position:sticky;top:0;z-index:50;background:linear-gradient(var(--bg) 80%,transparent)}
.header h1{font-family:var(--font2);font-size:20px;font-weight:700;letter-spacing:-0.5px}
.header p{font-size:12px;color:var(--text2);margin-top:2px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:0 16px 12px}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px}

/* BADGE */
.badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;font-family:var(--font2);font-weight:700;font-size:14px}
.grade-5{background:rgba(74,222,128,.15);color:var(--green)}
.grade-4{background:rgba(96,165,250,.15);color:var(--blue)}
.grade-3{background:rgba(251,191,36,.15);color:var(--amber)}
.grade-2{background:rgba(248,113,113,.15);color:var(--red)}
.grade-n{background:var(--bg4);color:var(--text2)}

/* AVG DISPLAY */
.avg-big{font-family:var(--font2);font-size:28px;font-weight:700}
.avg-sub{font-size:11px;color:var(--text2);margin-top:2px}

/* PROGRESS BAR */
.prog-track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:8px 0}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--r2);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-danger{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:var(--red)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:var(--r3)}
.btn-full{width:100%;margin-top:8px}

/* INPUTS */
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);color:var(--text);font-family:var(--font);font-size:14px;padding:10px 12px;width:100%;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--bg2)}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.form-row{margin-bottom:12px}

/* TABS */
.tabs{display:flex;gap:4px;padding:0 16px 12px}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .2s;background:none;color:var(--text3)}
.tab.active{background:var(--bg3);border-color:var(--border2);color:var(--text)}

/* SUBJECT ITEM */
.subject-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin:0 16px 8px;cursor:pointer;transition:border .2s}
.subject-row:active{border-color:var(--border2)}
.subject-info{flex:1;min-width:0}
.subject-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subject-meta{font-size:11px;color:var(--text2);margin-top:2px}
.subject-grades{display:flex;gap:4px;flex-wrap:wrap}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 16px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:11px;cursor:pointer;position:relative}
.cal-day.today{background:var(--bg4);font-weight:700;color:var(--accent2)}
.cal-day.has-event::after{content:'';width:4px;height:4px;background:var(--accent);border-radius:50%;position:absolute;bottom:3px}
.cal-day.other-month{color:var(--text3)}
.cal-weekday{font-size:10px;color:var(--text3);text-align:center;padding:8px 0}

/* WIDGET STRIP */
.widget{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border2);border-radius:var(--r);padding:16px;margin:0 16px 12px}
.widget-title{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}

/* SETTINGS */
.range-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.range-row input[type=range]{flex:1;accent-color:var(--accent)}
.range-val{font-family:var(--font2);font-size:13px;font-weight:600;min-width:28px;text-align:right}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--border2);padding:20px;width:100%;max-height:92vh;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:var(--font2);font-size:16px;font-weight:700;margin-bottom:16px}

/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:32px 20px;text-align:center;cursor:pointer;transition:border .2s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent)}
.upload-zone svg{width:40px;height:40px;color:var(--text3);margin-bottom:8px}
.upload-zone p{color:var(--text2);font-size:13px}

/* GRADE DOTS */
.grade-dot-row{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.grade-dot{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .15s}
.grade-dot:active{transform:scale(.9)}

/* ALERT STRIP */
.alert{padding:10px 14px;border-radius:var(--r2);margin:0 16px 10px;font-size:12px;font-weight:500}
.alert-warn{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:var(--amber)}
.alert-ok{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green)}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}
.empty h3{font-size:15px;font-weight:500;margin-bottom:6px;color:var(--text2)}
.empty p{font-size:12px;line-height:1.6}

/* SCROLL HINT */
::-webkit-scrollbar{width:0}

/* SECTION HEADER */
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 16px 8px}
.section-hdr h2{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase}

/* CHIPS */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{padding:3px 10px;border-radius:20px;font-size:11px;background:var(--bg3);border:1px solid var(--border);color:var(--text2)}

/* WHAT DO I NEED */
.need-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.need-row:last-child{border-bottom:none}
.need-label{font-size:13px;color:var(--text2)}
.need-val{font-size:13px;font-weight:600}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================
//  STORAGE
// ============================================================
const DB = {
  load(k,d=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};

// ============================================================
//  STATE
// ============================================================
let state = {
  tab: 'home',
  subjects: DB.load('subjects', []),
  events: DB.load('events', []),
  settings: DB.load('settings', {
    thresholds: {5:4.6, 4:3.6, 3:2.6, 2:1.6}
  }),
  modal: null,
  calMonth: new Date().getMonth(),
  calYear: new Date().getFullYear(),
  activeSubject: null,
};

// ============================================================
//  UTILS
// ============================================================
function avg(arr){
  if(!arr||!arr.length) return null;
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}
function gradeFromAvg(a,thr){
  if(a===null) return null;
  if(a>=thr[5]) return 5;
  if(a>=thr[4]) return 4;
  if(a>=thr[3]) return 3;
  return 2;
}
function colorForGrade(g){
  return {5:'grade-5',4:'grade-4',3:'grade-3',2:'grade-2'}[g]||'grade-n';
}
function colorVar(g){
  return {5:'var(--green)',4:'var(--blue)',3:'var(--amber)',2:'var(--red)'}[g]||'var(--text3)';
}
function howMany(currentAvg, n, target, thr){
  // how many grades `n` needed to reach grade `target`
  const needed = thr[target];
  const total = currentAvg.sum + n * target;
  const cnt = currentAvg.count + n;
  if(total/cnt >= needed) return n;
  return null;
}
function gradeRequirements(subj, thr){
  const grades = subj.grades.map(g=>g.value);
  const a = avg(grades);
  if(a===null) return null;
  const sum = grades.reduce((s,b)=>s+b,0);
  const count = grades.length;
  const currentGrade = gradeFromAvg(a,thr);

  // Сколько оценок `gradeVal` нужно получить чтобы средний стал >= threshold
  function needToReach(gradeVal, threshold){
    if(a >= threshold) return 0; // уже достигнуто
    for(let n=1;n<=30;n++){
      const newAvg=(sum+n*gradeVal)/(count+n);
      if(newAvg >= threshold) return n;
    }
    return null; // недостижимо
  }

  // Сколько оценок `gradeVal` нужно получить чтобы средний упал НИЖЕ threshold
  function needToFall(gradeVal, threshold){
    if(a < threshold) return 0; // уже ниже
    for(let n=1;n<=30;n++){
      const newAvg=(sum+n*gradeVal)/(count+n);
      if(newAvg < threshold) return n;
    }
    return null; // невозможно уронить
  }

  // Для роста: сколько N нужно чтобы получить оценку выше текущей
  const toGet5  = needToReach(5, thr[5]);
  const toGet4  = needToReach(4, thr[4]);

  // Для потери: сколько двоек/троек нужно чтобы потерять текущую оценку
  // Теряем оценку G если средний падает ниже порога G
  const loseBy2 = currentGrade >= 4 ? needToFall(2, thr[currentGrade]) : null;
  const loseBy3 = currentGrade >= 4 ? needToFall(3, thr[currentGrade]) : null;
  const lose3by2 = currentGrade === 3 ? needToFall(2, thr[3]) : null;

  return {a, currentGrade, toGet5, toGet4, loseBy2, loseBy3, lose3by2, sum, count};
}
function id(){return Math.random().toString(36).slice(2,9)}
function fmt(d){return new Date(d).toLocaleDateString('ru',{day:'numeric',month:'short'})}
function daysLeft(d){
  const t=new Date(d);t.setHours(0,0,0,0);
  const n=new Date();n.setHours(0,0,0,0);
  return Math.round((t-n)/86400000);
}

// ============================================================
//  RENDER ENGINE (minimal vdom-less)
// ============================================================
function render(){
  const app = document.getElementById('app');
  app.innerHTML = renderApp();
  bindEvents();
}

function renderApp(){
  return `
    ${renderNav()}
    ${state.tab==='home' ? renderHome() : ''}
    ${state.tab==='subjects' ? renderSubjects() : ''}
    ${state.tab==='calendar' ? renderCalendar() : ''}
    ${state.tab==='add' ? renderAdd() : ''}
    ${state.tab==='settings' ? renderSettings() : ''}
    ${state.modal ? renderModal() : ''}
  `;
}

// ============================================================
//  NAV
// ============================================================
function renderNav(){
  const tabs=[
    {id:'home',icon:iconHome(),label:'Главная'},
    {id:'subjects',icon:iconBook(),label:'Предметы'},
    {id:'calendar',icon:iconCal(),label:'Календарь'},
    {id:'add',icon:iconPlus(),label:'Добавить'},
    {id:'settings',icon:iconGear(),label:'Настройки'},
  ];
  return `<nav class="nav">${tabs.map(t=>`
    <button class="nav-btn ${state.tab===t.id?'active':''}" data-tab="${t.id}">
      ${t.icon}<span>${t.label}</span>
    </button>`).join('')}</nav>`;
}

// ============================================================
//  HOME
// ============================================================
function renderHome(){
  const thr = state.settings.thresholds;
  const subjects = state.subjects;
  const today = new Date();
  const upcoming = state.events
    .filter(e=>daysLeft(e.date)>=0 && daysLeft(e.date)<=14)
    .sort((a,b)=>new Date(a.date)-new Date(b.date))
    .slice(0,3);

  const weakSubjects = subjects.filter(s=>{
    const a=avg(s.grades.map(g=>g.value));
    if(a===null) return false;
    return gradeFromAvg(a,thr)<=3;
  });

  const avgAll = subjects.length>0 ? avg(subjects.map(s=>avg(s.grades.map(g=>g.value))).filter(v=>v!==null)) : null;

  return `
    <div class="header">
      <h1>📚 Журнал</h1>
      <p>${today.toLocaleDateString('ru',{weekday:'long',day:'numeric',month:'long'})}</p>
    </div>

    ${avgAll!==null?`
    <div class="widget" style="margin-top:4px">
      <div class="widget-title">Общий рейтинг</div>
      <div style="display:flex;align-items:center;gap:16px">
        <div class="avg-big" style="color:${colorVar(gradeFromAvg(avgAll,thr))}">${avgAll.toFixed(2)}</div>
        <div>
          <div style="font-size:13px;font-weight:600">Оценка: <span class="${colorForGrade(gradeFromAvg(avgAll,thr))}" style="background:none;color:${colorVar(gradeFromAvg(avgAll,thr))}">${gradeFromAvg(avgAll,thr)||'—'}</span></div>
          <div class="avg-sub">${subjects.length} предметов · ${subjects.reduce((a,s)=>a+s.grades.length,0)} оценок</div>
        </div>
      </div>
    </div>`:''}

    ${weakSubjects.length>0?`
    <div class="section-hdr"><h2>🔴 Западают</h2></div>
    ${weakSubjects.map(s=>{
      const a=avg(s.grades.map(g=>g.value));
      const req=gradeRequirements(s,thr);
      return `<div class="card-sm" style="margin:0 16px 8px;background:rgba(248,113,113,.07);border-color:rgba(248,113,113,.2)">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:13px;font-weight:600">${s.name}</div>
          <div class="badge ${colorForGrade(gradeFromAvg(a,thr))}">${gradeFromAvg(a,thr)||'?'}</div>
        </div>
        <div style="font-size:11px;color:var(--text2);margin-top:4px">Средний: ${a.toFixed(2)} · Нужно 4: получи ${req?.toGet4||'?'}×«четвёрку»</div>
      </div>`;
    }).join('')}`:''}

    ${upcoming.length>0?`
    <div class="section-hdr" style="margin-top:8px"><h2>📅 Ближайшее</h2></div>
    ${upcoming.map(e=>{
      const dl=daysLeft(e.date);
      return `<div class="card-sm" style="margin:0 16px 8px;cursor:pointer" data-open-event="${e.id}">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="background:${dl<=2?'rgba(248,113,113,.15)':dl<=5?'rgba(251,191,36,.15)':'var(--bg4)'};color:${dl<=2?'var(--red)':dl<=5?'var(--amber)':'var(--text2)'};border-radius:8px;padding:6px 10px;text-align:center;min-width:44px">
            <div style="font-family:var(--font2);font-size:14px;font-weight:700">${dl===0?'Сег':dl===1?'Завт':dl+'д'}</div>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.title}</div>
            <div style="font-size:11px;color:var(--text2)">${e.subject||''} · ${fmt(e.date)}</div>
          </div>
        </div>
        ${e.material?`<div style="font-size:11px;color:var(--text3);margin-top:6px;padding:6px 8px;background:var(--bg4);border-radius:6px">📖 ${e.material}</div>`:''}
      </div>`;
    }).join('')}`:''}

    ${subjects.length===0?`
    <div class="empty">
      ${iconBookEmpty()}
      <h3>Добавь предметы</h3>
      <p>Перейди во вкладку «Добавить»<br>чтобы начать отслеживать оценки</p>
    </div>`:''}

    ${subjects.length>0?`
    <div class="section-hdr" style="margin-top:8px"><h2>Все предметы</h2></div>
    ${subjects.map(s=>{
      const grades=s.grades.map(g=>g.value);
      const a=avg(grades);
      const g=gradeFromAvg(a,thr);
      const pct=a?(a/5)*100:0;
      return `<div class="subject-row" data-subject="${s.id}">
        <div class="badge ${colorForGrade(g)}">${g||'?'}</div>
        <div class="subject-info">
          <div class="subject-name">${s.name}</div>
          <div class="subject-meta">${a?a.toFixed(2):'—'} · ${grades.length} оценок</div>
          <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${colorVar(g)}"></div></div>
        </div>
        <div class="subject-grades">
          ${grades.slice(-4).map(v=>`<div class="badge ${colorForGrade(v)}" style="width:24px;height:24px;font-size:11px">${v}</div>`).join('')}
        </div>
      </div>`;
    }).join('')}`:''}
  `;
}

// ============================================================
//  SUBJECTS DETAIL
// ============================================================
function renderSubjects(){
  if(state.activeSubject){
    return renderSubjectDetail(state.activeSubject);
  }
  const thr=state.settings.thresholds;
  return `
    <div class="header">
      <h1>Предметы</h1>
      <p>Все оценки и статистика</p>
    </div>
    ${state.subjects.length===0?`<div class="empty">${iconBookEmpty()}<h3>Предметов нет</h3><p>Добавь предмет во вкладке «Добавить»</p></div>`:''}
    ${state.subjects.map(s=>{
      const grades=s.grades.map(g=>g.value);
      const a=avg(grades);
      const g=gradeFromAvg(a,thr);
      return `<div class="card" data-subject="${s.id}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="font-size:15px;font-weight:600">${s.name}</div>
          <div class="badge ${colorForGrade(g)}" style="width:36px;height:36px;font-size:15px">${g||'?'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
          <span style="font-family:var(--font2);font-size:20px;font-weight:700;color:${colorVar(g)}">${a?a.toFixed(2):'—'}</span>
          <span style="font-size:11px;color:var(--text2)">(${grades.length} оценок)</span>
        </div>
        <div class="grade-dot-row">
          ${s.grades.slice().reverse().slice(0,12).map(gr=>`
            <div class="grade-dot ${colorForGrade(gr.value)}" title="${gr.date||''}" style="border-color:transparent">${gr.value}</div>
          `).join('')}
          ${grades.length>12?`<span style="font-size:11px;color:var(--text3);align-self:center">+${grades.length-12}</span>`:''}
        </div>
        <div style="display:flex;gap:6px;margin-top:10px">
          <button class="btn btn-sm" data-subject="${s.id}">Подробнее</button>
          <button class="btn btn-sm btn-primary" data-add-grade="${s.id}">+ Оценка</button>
        </div>
      </div>`;
    }).join('')}
  `;
}

function renderSubjectDetail(subjectId){
  const s = state.subjects.find(x=>x.id===subjectId);

function renderMiniChart(grades){
  if(!grades||grades.length<2) return `<div style="color:var(--text3);font-size:12px;margin-top:10px">Мало данных</div>`;
  const vals=grades.map(g=>g.value);
  const last5=vals.slice(-8);
  const W=100,H=44;
  const mn=1,mx=5;
  const pts=last5.map((v,i)=>{
    const x=i/(last5.length-1)*W;
    const y=H-((v-mn)/(mx-mn))*H;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const trend=last5[last5.length-1]-last5[0];
  return `
    <svg viewBox="0 0 100 44" style="width:100%;height:44px">
      <polyline points="${pts}" fill="none" stroke="${trend>=0?'var(--green)':'var(--red)'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div style="font-size:11px;color:${trend>=0?'var(--green)':'var(--red)'};margin-top:2px">${trend>=0?'▲':'▼'} ${Math.abs(trend).toFixed(1)}</div>
  `;
}

function renderCalendar(){
  const months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const today=new Date();
  const yr=state.calYear, mo=state.calMonth;
  const first=new Date(yr,mo,1).getDay();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const offset=(first+6)%7; // Mon start

  const eventDates=new Set(state.events
    .filter(e=>{const d=new Date(e.date);return d.getMonth()===mo&&d.getFullYear()===yr})
    .map(e=>new Date(e.date).getDate()));

  let cells=[];
  for(let i=0;i<offset;i++) cells.push({day:null});
  for(let d=1;d<=daysInMonth;d++) cells.push({day:d});

  const upcomingMonth=state.events
    .filter(e=>{const d=new Date(e.date);return d.getMonth()===mo&&d.getFullYear()===yr})
    .sort((a,b)=>new Date(a.date)-new Date(b.date));

  return `
    <div class="header">
      <h1>Календарь</h1>
      <p>КР, тесты и важные даты</p>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 16px 12px">
      <button class="btn btn-sm" data-cal-prev>←</button>
      <span style="font-family:var(--font2);font-size:14px;font-weight:600">${months[mo]} ${yr}</span>
      <button class="btn btn-sm" data-cal-next>→</button>
    </div>
    <div class="cal-grid">
      ${['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>`<div class="cal-weekday">${d}</div>`).join('')}
      ${cells.map(c=>{
        if(!c.day) return `<div></div>`;
        const isToday=c.day===today.getDate()&&mo===today.getMonth()&&yr===today.getFullYear();
        const hasEv=eventDates.has(c.day);
        return `<div class="cal-day ${isToday?'today':''} ${hasEv?'has-event':''}" data-cal-day="${yr}-${String(mo+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}">${c.day}</div>`;
      }).join('')}
    </div>

    ${upcomingMonth.length>0?`
    <div class="section-hdr" style="margin-top:16px"><h2>События месяца</h2></div>
    ${upcomingMonth.map(e=>{
      const dl=daysLeft(e.date);
      return `<div class="card-sm" style="margin:0 16px 8px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="background:var(--bg4);border-radius:8px;padding:6px 8px;text-align:center;min-width:40px">
            <div style="font-size:10px;color:var(--text3)">${new Date(e.date).toLocaleDateString('ru',{month:'short'})}</div>
            <div style="font-family:var(--font2);font-size:16px;font-weight:700">${new Date(e.date).getDate()}</div>
          </div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600">${e.title}</div>
            <div style="font-size:11px;color:var(--text2)">${e.subject||'Без предмета'} · ${dl<0?'прошло':dl===0?'сегодня':dl+'д'}</div>
            ${e.material?`<div style="font-size:11px;color:var(--text3);margin-top:4px">📖 ${e.material}</div>`:''}
          </div>
          <button class="btn btn-sm btn-danger" data-del-event="${e.id}">✕</button>
        </div>
      </div>`;
    }).join('')}`:`<div style="padding:24px 16px;color:var(--text3);font-size:13px;text-align:center">Нет событий в этом месяце</div>`}
    <div style="padding:0 16px 8px">
      <button class="btn btn-full btn-primary" data-modal="addEvent">+ Добавить КР / Событие</button>
    </div>
  `;
}

// ============================================================
//  EVENTS BINDING
// ============================================================
function bindEvents(){
  document.querySelectorAll('[data-tab]').forEach(el=>{
    el.addEventListener('click',()=>{
      state.tab=el.dataset.tab;
      state.activeSubject=null;
      render();
    });
  });

  document.querySelectorAll('[data-subject]').forEach(el=>{
    el.addEventListener('click',()=>{
      state.activeSubject=el.dataset.subject;
      state.tab='subjects';
      render();
    });
  });

  document.querySelector('[data-back]')?.addEventListener('click',()=>{
    state.activeSubject=null;
    render();
  });

  document.querySelectorAll('[data-add-grade]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      state.modal={type:'addGrade',subjectId:el.dataset.addGrade};
      render();
    });
  });

  document.querySelector('[data-modal="addEvent"]')?.addEventListener('click',()=>{
    state.modal={type:'addEvent',date:null};
    render();
  });

  document.querySelectorAll('[data-cal-day]').forEach(el=>{
    el.addEventListener('click',()=>{
      state.modal={type:'addEvent',date:el.dataset.calDay};
      render();
    });
  });

  document.querySelector('[data-cal-prev]')?.addEventListener('click',()=>{
    state.calMonth--;
    if(state.calMonth<0){state.calMonth=11;state.calYear--;}
    render();
  });
  document.querySelector('[data-cal-next]')?.addEventListener('click',()=>{
    state.calMonth++;
    if(state.calMonth>11){state.calMonth=0;state.calYear++;}
    render();
  });

  document.querySelectorAll('[data-close-modal]').forEach(el=>{
    el.addEventListener('click',()=>{state.modal=null;render();});
  });

  document.querySelectorAll('[data-del-event]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      state.events=state.events.filter(x=>x.id!==el.dataset.delEvent);
      DB.save('events',state.events);
      render();
    });
  });

  document.querySelectorAll('[data-del-grade]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const subj=state.subjects.find(x=>x.id===el.dataset.delGrade);
      if(subj) subj.grades=subj.grades.filter(g=>g.id!==el.dataset.gradeId);
      DB.save('subjects',state.subjects);
      render();
    });
  });

  document.querySelectorAll('[data-del-subject]').forEach(el=>{
    el.addEventListener('click',()=>{
      if(confirm('Удалить предмет и все оценки?')){
        state.subjects=state.subjects.filter(x=>x.id!==el.dataset.delSubject);
        state.activeSubject=null;
        DB.save('subjects',state.subjects);
        render();
      }
    });
  });

  // Grade selector buttons
  document.querySelectorAll('.grade-sel-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const val=btn.dataset.gval;
      // figure out which hidden input to target
      const modal=document.querySelector('.modal');
      const hidInput=modal
        ? modal.querySelector('#m-grade')
        : document.getElementById('selectedGrade');
      if(hidInput) hidInput.value=val;
      // highlight
      const container=btn.closest('.form-row')||btn.parentElement;
      container.querySelectorAll('.grade-sel-btn').forEach(b=>{
        b.style.borderColor='transparent';
        b.style.opacity='0.6';
      });
      btn.style.borderColor='currentColor';
      btn.style.opacity='1';
    });
  });

  // Add subject
  document.getElementById('addSubjectBtn')?.addEventListener('click',()=>{
    const name=document.getElementById('newSubjectName').value.trim();
    if(!name) return alert('Введи название');
    if(state.subjects.find(s=>s.name.toLowerCase()===name.toLowerCase())) return alert('Уже есть');
    state.subjects.push({id:id(),name,grades:[]});
    DB.save('subjects',state.subjects);
    document.getElementById('newSubjectName').value='';
    render();
  });

  // Add grade from add tab
  document.getElementById('addGradeBtn')?.addEventListener('click',()=>{
    const sid=document.getElementById('gradeSubjectSel').value;
    const gval=parseInt(document.getElementById('selectedGrade').value);
    const date=document.getElementById('gradeDate').value;
    const note=document.getElementById('gradeNote').value.trim();
    if(!sid) return alert('Выбери предмет');
    if(!gval) return alert('Выбери оценку');
    const subj=state.subjects.find(s=>s.id===sid);
    if(!subj) return;
    const today=new Date().toISOString().slice(0,10);
    // Check duplicate by date
    if(subj.grades.find(g=>g.date===date&&g.value===gval)){
      if(!confirm('Такая оценка за эту дату уже есть. Добавить всё равно?')) return;
    }
    subj.grades.push({id:id(),value:gval,date:date||today,note});
    DB.save('subjects',state.subjects);
    document.getElementById('selectedGrade').value='';
    document.getElementById('gradeNote').value='';
    render();
  });

  // Modal save grade
  document.getElementById('m-saveGrade')?.addEventListener('click',()=>{
    const sid=document.getElementById('m-subjectSel').value;
    const gval=parseInt(document.getElementById('m-grade').value);
    const date=document.getElementById('m-date').value;
    const note=document.getElementById('m-note').value.trim();
    if(!sid||!gval) return alert('Выбери предмет и оценку');
    const subj=state.subjects.find(s=>s.id===sid);
    if(!subj) return;
    subj.grades.push({id:id(),value:gval,date,note});
    DB.save('subjects',state.subjects);
    state.modal=null;
    render();
  });

  // Modal save event
  document.getElementById('ev-save')?.addEventListener('click',()=>{
    const title=document.getElementById('ev-title').value.trim();
    const subject=document.getElementById('ev-subject').value;
    const date=document.getElementById('ev-date').value;
    const material=document.getElementById('ev-material').value.trim();
    if(!title||!date) return alert('Заполни название и дату');
    state.events.push({id:id(),title,subject,date,material});
    DB.save('events',state.events);
    state.modal=null;
    render();
  });

  // Settings thresholds
  document.querySelectorAll('[data-thr]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const g=inp.dataset.thr;
      state.settings.thresholds[g]=parseFloat(inp.value);
      document.getElementById('thrVal'+g).textContent=parseFloat(inp.value).toFixed(1);
      DB.save('settings',state.settings);
    });
  });

  // Export
  document.getElementById('exportBtn')?.addEventListener('click',()=>{
    const data=JSON.stringify({subjects:state.subjects,events:state.events,settings:state.settings},null,2);
    const blob=new Blob([data],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='grades-backup.json';
    a.click();
  });

  // Clear
  document.getElementById('clearBtn')?.addEventListener('click',()=>{
    if(confirm('Удалить ВСЕ данные? Это необратимо!')) {
      state.subjects=[];state.events=[];
      DB.save('subjects',[]);DB.save('events',[]);
      render();
    }
  });

  // Upload zone
  const uploadZone=document.getElementById('uploadZone');
  const fileInput=document.getElementById('fileInput');
  uploadZone?.addEventListener('click',()=>fileInput?.click());
  uploadZone?.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('drag');});
  uploadZone?.addEventListener('dragleave',()=>uploadZone.classList.remove('drag'));
  uploadZone?.addEventListener('drop',e=>{e.preventDefault();uploadZone.classList.remove('drag');handleFile(e.dataTransfer.files[0]);});
  fileInput?.addEventListener('change',()=>handleFile(fileInput.files[0]));

  // OCR save
  document.getElementById('ocr-save')?.addEventListener('click',el=>{
    const data=JSON.parse(el.currentTarget.dataset.ocrData);
    data.forEach((item,i)=>{
      const cb=document.getElementById('ocr-'+i);
      if(!cb?.checked) return;
      let subj=state.subjects.find(s=>s.name.toLowerCase()===item.subject.toLowerCase());
      if(!subj){
        subj={id:id(),name:item.subject,grades:[]};
        state.subjects.push(subj);
      }
      // Dedup by date
      if(!subj.grades.find(g=>g.date===item.date&&g.value===item.grade)){
        subj.grades.push({id:id(),value:item.grade,date:item.date,note:'со скриншота'});
      }
    });
    DB.save('subjects',state.subjects);
    state.modal=null;
    state.tab='subjects';
    render();
  });

  document.querySelectorAll('[data-open-event]').forEach(el=>{
    el.addEventListener('click',()=>{
      // show event detail inline (just open edit/view)
    });
  });
}

// ============================================================
//  OCR VIA CLAUDE API
// ============================================================
async function handleFile(file){
  if(!file||!file.type.startsWith('image/')) return alert('Выбери изображение!');
  const ocrResult=document.getElementById('ocrResult');
  ocrResult.style.display='block';
  ocrResult.innerHTML=`<div style="padding:12px;background:var(--bg3);border-radius:var(--r2);font-size:12px;color:var(--text2)">⏳ Распознаю оценки...</div>`;

  const reader=new FileReader();
  reader.onload=async()=>{
    const base64=reader.result.split(',')[1];
    const mediaType=file.type;
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          messages:[{
            role:'user',
            content:[
              {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
              {type:'text',text:`Посмотри на скриншот оценок из школьного журнала. Найди все оценки. 
Для каждой оценки верни JSON-массив объектов с полями:
- subject: название предмета (строка)
- grade: оценка (число 2, 3, 4 или 5)
- date: дата в формате YYYY-MM-DD (если видно, иначе null)
Верни ТОЛЬКО JSON-массив, без пояснений. Пример: [{"subject":"Математика","grade":5,"date":"2024-03-15"}]`}
            ]
          }]
        })
      });
      const data=await resp.json();
      const text=data.content?.find(c=>c.type==='text')?.text||'[]';
      const clean=text.replace(/```json?|```/g,'').trim();
      const grades=JSON.parse(clean);
      if(!grades.length) throw new Error('no grades');
      ocrResult.innerHTML=`<div style="padding:10px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);border-radius:var(--r2);font-size:12px;color:var(--green)">✅ Найдено ${grades.length} оценок</div>`;
      setTimeout(()=>{
        state.modal={type:'ocrConfirm',data:grades};
        render();
      },600);
    }catch(err){
      ocrResult.innerHTML=`<div style="padding:10px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:var(--r2);font-size:12px;color:var(--red)">❌ Не удалось распознать. Попробуй добавить вручную.</div>`;
    }
  };
  reader.readAsDataURL(file);
}
